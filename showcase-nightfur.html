  flash:"M6 2h12v3H6zm0 5v1l2 2v12h8V10l2-2V7H6zm6 8.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z",

const NIGHT={style:"fluffy",shape:"circle",glyphStyle:"satin",bg:"transparent",
  baseColor:"#1b1819",colorB:"#1b1819",colorC:"#1b1819",glyphColor:"#e9e5db",
  bgColor:"#151313",glyphText:"",svgPath:"",glyphScale:44,furLen:8,density:1.5,
  sheen:0.5,seed:9,uploadImg:null,uploadId:0};
const PETAL="#262220",PET_HI="rgb(78,72,64)",PET_LO="rgb(8,6,5)";

/* ---- embossed botanical flowers (filled teardrop petals) ---- */
function petal(g,cx,cy,r,ang){
  g.save();g.translate(cx,cy);g.rotate(ang);
  g.beginPath();g.moveTo(0,0);
  g.quadraticCurveTo(-r*0.5,-r*0.55,0,-r*1.15);
  g.quadraticCurveTo(r*0.5,-r*0.55,0,0);
  g.closePath();g.fill();g.restore();
}
function blossom(g,cx,cy,r,petals,rot){
  petals=petals||5;rot=rot||0;
  for(let i=0;i<petals;i++)petal(g,cx,cy,r,rot+i/petals*Math.PI*2);
  g.save();g.globalCompositeOperation="destination-out";
  g.beginPath();g.arc(cx,cy,r*0.24,0,Math.PI*2);g.fill();g.restore();
  g.beginPath();g.arc(cx,cy,r*0.15,0,Math.PI*2);g.fill();
}
function bud(g,cx,cy,r,ang){
  g.save();g.translate(cx,cy);g.rotate(ang||0);
  g.beginPath();g.ellipse(0,0,r*0.5,r*0.78,0,0,Math.PI*2);g.fill();g.restore();
}
function leaf(g,cx,cy,len,ang){
  g.save();g.translate(cx,cy);g.rotate(ang);
  g.beginPath();g.ellipse(0,len*0.5,len*0.22,len*0.5,0,0,Math.PI*2);g.fill();
  g.save();g.globalCompositeOperation="destination-out";g.lineWidth=Math.max(1.5,len*0.03);
  g.beginPath();g.moveTo(0,len*0.06);g.lineTo(0,len*0.94);g.stroke();g.restore();
  g.restore();
}
function stem(g,x1,y1,cxp,cyp,x2,y2,w){
  g.lineWidth=w;g.lineCap="round";
  g.beginPath();g.moveTo(x1,y1);g.quadraticCurveTo(cxp,cyp,x2,y2);g.stroke();
}
function rr(c,x,y,w,h,r){c.beginPath();
  if(c.roundRect)c.roundRect(x,y,w,h,r);
  else{c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);
    c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}}
/* draw() fills black flower shapes; emboss tone-on-tone (highlight top-left,
   shadow bottom-right), clip to the host tile, blit centred at (cx,cy) */
function embroider(cx,cy,SM,draw,rot,clip){
  const F=SCALE,PS=Math.round(SM*F);
  const c=document.createElement("canvas");c.width=PS;c.height=PS;
  const g=c.getContext("2d");g.scale(F,F);g.fillStyle="#000";g.strokeStyle="#000";
  draw(g);
  const mask={canvas:c,S:PS};mask.bbox=alphaBBox(g,PS);
  if(!mask.bbox)return;
  const out=document.createElement("canvas");out.width=PS;out.height=PS;
  const og=out.getContext("2d");
  og.save();og.globalAlpha=0.55;og.filter=`blur(${2*F}px)`;
  og.drawImage(tintMask(mask,"rgb(0,0,0)"),1.5*F,3*F);og.restore();
  og.drawImage(tintMask(mask,PETAL),0,0);
  og.globalCompositeOperation="source-atop";
  og.globalAlpha=0.7;og.drawImage(tintMask(mask,PET_HI),-1.6*F,-1.6*F);
  og.globalAlpha=0.6;og.drawImage(tintMask(mask,PET_LO),1.6*F,2*F);
  og.globalCompositeOperation="source-over";og.globalAlpha=1;
  ctx.save();
  if(clip){rr(ctx,clip.x,clip.y,clip.w,clip.h,clip.r);ctx.clip();}
  ctx.translate(cx,cy);if(rot)ctx.rotate(rot);
  ctx.drawImage(out,-SM/2,-SM/2,SM,SM);ctx.restore();
}
/* full bouquet in a 300-box: stems from bottom, blossoms, buds, leaves */
function bouquet(g){
  stem(g,150,275,140,205,120,135,5);
  stem(g,150,275,178,210,210,160,5);
  stem(g,150,270,122,200,95,125,4);
  stem(g,150,272,162,208,178,150,4);
  leaf(g,150,232,50,-0.5);leaf(g,174,216,44,0.7);leaf(g,126,202,38,-1.0);leaf(g,158,236,40,0.35);
  blossom(g,116,132,54,5,0.2);
  blossom(g,205,152,42,6,0.5);
  blossom(g,98,112,28,5,0);
  blossom(g,168,176,34,5,0.8);
  bud(g,224,108,22,-0.5);bud(g,80,82,18,0.3);bud(g,200,110,15,-0.2);
}
function sprig(g){ /* vertical single-stem for the tall pill */
  stem(g,95,255,95,175,95,95,5);
  leaf(g,95,210,42,-0.6);leaf(g,95,195,38,0.6);
  blossom(g,95,90,46,5,0.2);
  blossom(g,122,140,26,5,0.4);
  bud(g,66,120,16,-0.3);
}
function smallSprig(g){
  stem(g,72,150,82,110,92,72,4);
  leaf(g,82,120,32,0.5);
  blossom(g,92,68,38,5,0.2);
  bud(g,58,96,15,-0.4);
}

/* dark depth-of-field backdrop: big soft bokeh + corner vignette */
{
  const lg=ctx.createLinearGradient(0,0,0,H);
  lg.addColorStop(0,"#232020");lg.addColorStop(1,"#131111");
  ctx.fillStyle=lg;ctx.fillRect(0,0,W,H);
  const rng=mulberry32(4);
  for(let i=0;i<6;i++){
    const x=rng()*W,y=rng()*H,r=130+rng()*200;
    const b=ctx.createRadialGradient(x,y,r*0.4,x,y,r);
    b.addColorStop(0,"rgba(255,250,240,0.06)");b.addColorStop(1,"rgba(255,250,240,0)");
    ctx.fillStyle=b;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  }
  const v=ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.75);
  v.addColorStop(0,"rgba(0,0,0,0)");v.addColorStop(1,"rgba(0,0,0,0.42)");
  ctx.fillStyle=v;ctx.fillRect(0,0,W,H);
}

/* place a rendered component, centre-anchored, optional rotation */
function comp(over,disp){
  const S=Math.round(disp*SCALE);
  const t=document.createElement("canvas");t.width=S;t.height=S;
  renderIcon(t.getContext("2d"),S,Object.assign({},NIGHT,over));
  return t;
}
function place(cx,cy,disp,over,rot,shadow){
  const t=comp(over||{},disp);
  ctx.save();
  if(shadow!==false){ctx.shadowColor="rgba(0,0,0,0.55)";ctx.shadowBlur=22;ctx.shadowOffsetY=12;}
  ctx.translate(cx,cy);if(rot)ctx.rotate(rot);
  ctx.drawImage(t,-disp/2,-disp/2,disp,disp);
  ctx.restore();
}
/* stamp a lone glyph / text piece (no body) */
function stamp(cx,cy,widthPx,glyph,style,rot,color){
  const S=Math.round(widthPx*2);
  const sp=Object.assign({},NIGHT,{glyphScale:88,glyphStyle:style||"stitched",
    glyphColor:color||NIGHT.glyphColor});
  if(glyph.length>30&&glyph[0]==="M"){sp.svgPath=glyph;sp.glyphText="";}
  else{sp.glyphText=glyph;sp.svgPath="";}
  const t=document.createElement("canvas");t.width=S;t.height=S;
  const g=t.getContext("2d");
  const mask=buildGlyphMask(S,sp),rng=mulberry32(7);
  if(mask){
    if(sp.glyphStyle==="raised")drawGlyphRaised(g,S,rng,mask,sp.glyphColor);
    else if(sp.glyphStyle==="flocked")drawGlyphFlocked(g,S,rng,mask,sp.glyphColor,10,1);
    else drawGlyphStitched(g,S,rng,mask,sp.glyphColor);
  }
  ctx.save();ctx.translate(cx,cy);if(rot)ctx.rotate(rot);
  ctx.drawImage(t,-widthPx/2,-widthPx/2,widthPx,widthPx);
  ctx.restore();
}

/* ── row 1: quick-settings tile ── */
place(210,300,357,{shape:"squircle"});
place(155,245,150,{svgPath:"M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z",glyphText:"",glyphScale:42},0,false);

  ctx.save();ctx.translate(430,570);ctx.rotate(Math.PI/2);
  ctx.drawImage(t,-125,-125,250,250);ctx.restore();
}
{ /* oval knob */
  ctx.save();ctx.translate(430,638);

/* ── row 5 ── */

embroider(300,1042,120,g=>blossom(g,60,60,46,5,0.2),0,{x:250,y:992,w:100,h:100,r:50});

/* ---- photographic post: top light, vignette, film grain ---- */
(function post(){
  let g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"rgba(255,250,240,0.05)");g.addColorStop(0.4,"rgba(255,250,240,0)");
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  g=ctx.createRadialGradient(W/2,H*0.45,H*0.28,W/2,H/2,H*0.72);
  g.addColorStop(0,"rgba(0,0,0,0)");g.addColorStop(1,"rgba(0,0,0,0.28)");
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  const n=document.createElement("canvas");n.width=n.height=160;
  const ng=n.getContext("2d"),id=ng.createImageData(160,160);
  for(let i=0;i<id.data.length;i+=4){const v=Math.random()*255;
    id.data[i]=id.data[i+1]=id.data[i+2]=v;id.data[i+3]=255;}
  ng.putImageData(id,0,0);
  ctx.save();ctx.globalAlpha=0.05;ctx.globalCompositeOperation="overlay";
  for(let y=0;y<H;y+=80)for(let x=0;x<W;x+=80)ctx.drawImage(n,x,y,80,80);
  ctx.restore();
})();
document.title="EXPORT-READY";
