<!doctype html>
<html><head><meta charset="utf-8"><title>tr</title>
<style>body{margin:0}canvas{display:block}</style></head><body>
<canvas id="s" width="740" height="330"></canvas>
<script src="engine.js"></script>
<script>
"use strict";
const SCALE=2,cv=document.getElementById("s");cv.width=740*SCALE;cv.height=330*SCALE;
const ctx=cv.getContext("2d");ctx.scale(SCALE,SCALE);
/* fake nature wallpaper so we can SEE through the glass */
let bg=ctx.createLinearGradient(0,0,200,330);
bg.addColorStop(0,"#93b06a");bg.addColorStop(0.5,"#6f9a4e");bg.addColorStop(1,"#aac06a");
ctx.fillStyle=bg;ctx.fillRect(0,0,740,330);
const rng=mulberry32(5);
for(let i=0;i<40;i++){const x=rng()*740,y=rng()*330,r=6+rng()*22;
  ctx.fillStyle=["rgba(235,180,215,.6)","rgba(255,240,175,.6)","rgba(180,215,150,.7)","rgba(205,160,225,.5)","rgba(255,255,255,.4)"][i%5];
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();}
const wifi="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.07 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z";
const base={style:"glass",shape:"circle",glyphStyle:"raised",bg:"transparent",
  baseColor:"#eef5e8",colorB:"#dceccf",colorC:"#c7dcb4",glyphColor:"#2f6b3f",bgColor:"#ccc",
  glyphText:"",svgPath:wifi,glyphScale:44,seed:7,light:225,glassThick:1.2,
  clarity:0.95,frost:0,transp:0,uploadImg:null,uploadId:0};
function tile(cx,cy,disp,over){const S=Math.round(disp*SCALE);
  const t=document.createElement("canvas");t.width=S;t.height=S;
  renderIcon(t.getContext("2d"),S,Object.assign({},base,over));
  ctx.drawImage(t,cx-disp/2,cy-disp/2,disp,disp);}
function label(x,y,s){ctx.fillStyle="#213610";ctx.font="14px Segoe UI";ctx.textAlign="center";ctx.fillText(s,x,y);}
tile(130,140,190,{});                                   /* clear glass */
tile(330,140,190,{glassThick:2.0});                     /* clear, thicker */
tile(520,140,190,{baseColor:"#2f9e44",colorB:"#40c057",colorC:"#1d6b2e",glyphColor:"#eaffea",clarity:0.15});/* solid green */
tile(660,140,150,{style:"vividglass",shape:"squircle",baseColor:"#a7e08f",colorB:"#7fd0c8",colorC:"#8fbfe8",clarity:0.9,glyph:"☁",glyphColor:"#2f5540"});
label(130,255,"Glass, clear 0.95");label(330,255,"clear + thick");label(520,255,"solid");label(660,255,"vivid clear");
document.title="EXPORT-READY";
</script></body></html>
